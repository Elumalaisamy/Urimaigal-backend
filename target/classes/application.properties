# ==========================================
# Urimaigal Backend Configuration
# ==========================================

server.port=${PORT:8080}
spring.application.name=Evaluation

# ==========================================
# MySQL Configuration
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Initialize schema on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ==========================================
# Apache Artemis JMS Configuration
# ==========================================
spring.artemis.broker-url=${ARTEMIS_URL}
spring.artemis.user=${ARTEMIS_USER}
spring.artemis.password=${ARTEMIS_PASSWORD}
spring.artemis.pool.enabled=false

# JMS listener concurrency
spring.jms.is-pub-sub-domain=false
spring.jms.template.default-destination=my-queue
spring.jms.listener.auto-startup=true
spring.jms.listener.concurrency=1
spring.jms.listener.max-concurrency=5

# Queue names
app.jms.booking-queue=booking.consultation.queue
app.jms.notification-queue=notification.queue
app.jms.chat-queue=chat.message.queue

# ==========================================
# Elasticsearch Configuration
# ==========================================
spring.elasticsearch.enabled=false
spring.elasticsearch.uris=${ES_URL}
spring.elasticsearch.username=${ES_USER}
spring.elasticsearch.password=${ES_PASSWORD}
elasticsearch.host=${ES_HOST}
elasticsearch.port=${ES_PORT}
elasticsearch.scheme=${ES_SCHEME}
elasticsearch.username=${ES_USER}
elasticsearch.password=${ES_PASSWORD}
elasticsearch.index.lawyers=lawyers
elasticsearch.index.consultations=consultations

# ==========================================
# JWT Security Configuration
# ==========================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==========================================
# CORS Configuration
# ==========================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ==========================================
# Logging
# ==========================================
logging.level.com.urimaigal=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.jms=DEBUG
